services:
  cleco-sites:
    build: .
    image: cleco-sites:latest
    container_name: cleco-sites
    # Run without AppArmor confinement. On some hosts an apparmor reload (package
    # update / periodic reload) unloads the docker-default profile out from under a
    # running container, after which the daemon can't stop it ("cannot stop container:
    # permission denied"). Unconfined avoids that; safe for a static nginx file server.
    security_opt:
      - apparmor=unconfined
    ports:
      # Fixed host port 8082 (8080 was taken). Stable across rebuilds — point the
      # reverse proxy here once.
      - "8082:80"
    restart: unless-stopped
